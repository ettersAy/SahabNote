<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SahabNote Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      background: #f9fafb;
      color: #1a1a1a;
      padding: 30px;
      max-width: 600px;
      margin: 0 auto;
    }
    h1 { font-size: 24px; margin-bottom: 20px; }
    .section { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; border: 1px solid #e5e7eb; }
    .section h2 { font-size: 16px; margin-bottom: 15px; color: #374151; }
    label { display: block; margin-bottom: 5px; font-weight: 500; color: #374151; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px;
      font-size: 14px; margin-bottom: 15px; outline: none;
    }
    input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.1); }
    .btn {
      padding: 8px 16px; border: 1px solid #d1d5db; border-radius: 6px;
      background: white; cursor: pointer; font-size: 14px;
    }
    .btn-primary { background: #3b82f6; color: white; border-color: #3b82f6; }
    .btn-primary:hover { background: #2563eb; }
    .btn:hover { background: #f3f4f6; }
    .status { margin-top: 10px; padding: 8px; border-radius: 6px; font-size: 13px; }
    .status.success { background: #dcfce7; color: #166534; }
    .status.error { background: #fef2f2; color: #991b1b; }
    .info { font-size: 12px; color: #6b7280; margin-top: 5px; }
    .actions { display: flex; gap: 8px; margin-top: 15px; }
    .inline-group { display: flex; gap: 8px; align-items: end; }
    .inline-group > div { flex: 1; }
    hr { border: none; border-top: 1px solid #e5e7eb; margin: 15px 0; }
  </style>
</head>
<body>
  <h1>SahabNote Settings</h1>

  <div class="section">
    <h2>Server Configuration</h2>
    <label for="server-url">Server URL</label>
    <input type="text" id="server-url" placeholder="http://localhost:8000" />

    <label for="auth-token">Auth Token / Sync Key</label>
    <input type="password" id="auth-token" placeholder="Your auth token or sync key" />

    <label>
      <input type="checkbox" id="show-token" />
      Show token
    </label>

    <div class="actions">
      <button class="btn btn-primary" id="save-settings-btn">Save Settings</button>
      <button class="btn" id="test-connection-btn">Test Connection</button>
    </div>

    <div id="connection-status" class="status hidden"></div>
    <div class="info" id="device-info"></div>
  </div>

  <div class="section">
    <h2>Account Setup</h2>
    <p style="margin-bottom:10px;color:#6b7280;">Register or login to get your sync key.</p>

    <div class="inline-group">
      <div>
        <label for="reg-username">Username</label>
        <input type="text" id="reg-username" />
      </div>
      <div>
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" />
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="register-btn">Register</button>
      <button class="btn" id="login-btn">Login</button>
    </div>
    <div id="account-status" class="status hidden"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
